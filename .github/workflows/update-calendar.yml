name: Update UFC Calendar

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Fetch UFC events
        run: |
          mkdir -p assets
          go run ./cmd/fetch

      - name: Generate ICS calendar
        run: go run ./cmd/ics

      - name: Create pull request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b31e2c788f8122c6d27f # v7.0.8
        with:
          commit-message: 'chore: update UFC calendar events'
          title: 'chore: update UFC calendar events'
          body: 'Automated UFC calendar update.'
          branch: chore/update-ufc-calendar
          add-paths: assets/
